# proto/url_shortener.proto (for gRPC between services)
syntax = "proto3";

service URLShortener {
    rpc Shorten (ShortenRequest) returns (ShortenResponse);
    rpc GetOriginal (GetRequest) returns (URLResponse);
    rpc GetStats (StatsRequest) returns (StatsResponse);
}

message ShortenRequest {
    string url = 1;
    string custom_code = 2;
}

message ShortenResponse {
    string short_code = 1;
    string status = 2;
}

message GetRequest {
    string short_code = 1;
}

message URLResponse {
    string original_url = 1;
    bool is_active = 2;
}

message StatsRequest {
    string short_code = 1;
}

message StatsResponse {
    string short_code = 1;
    int64 total_clicks = 2;
    int64 total_creations = 3;
    repeated string top_referers = 4;
}
